services:
  app:
    image: ghcr.io/OWNER/adygabza:VERSION
    restart: unless-stopped
    env_file:
      - /opt/adygabza/.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /opt/adygabza/database:/app/storage/database
      - /opt/adygabza/storage/app:/app/storage/app
      - /opt/adygabza/storage/logs:/app/storage/logs
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8080/up') === false ? 1 : 0);\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
